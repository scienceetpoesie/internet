<!DOCTYPE html>
<html>
<head>
<link rel="icon" href="https://github.com/scienceetpoesie/internet/raw/refs/heads/main/assets/icons/18.ico" type="image/x-icon">    
<meta charset="UTF-8">
<title>Magazine Porno</title>
<style>
body {
    background-color: #b55987;
    font-family: "Bodoni", cursive;
    color: black;
    text-align: center;
}

.container {
    margin: 100px auto;
    width: 600px;
    background: #c0c0c0;
    border: 4px outset white;
    padding: 10px;
    
}

h1 {
    font-size: 40px;
}

.buttons {
    margin-top: 10px;
}

button {
    background: #c0c0c0;
    border: 2px outset white;
    padding: 5px 15px;
    font-family: "Times New Roman";
    cursor: pointer;
}

button:active {
    border: 2px inset black;
}

.footer {
    margin-top: 20px;
    font-size: 19px;
    font-family:"time new roman"
}
    .star {
    position: fixed;
    top: 5px;
    font-size: 24px;
    color: yellow;
    font-family: "Garamond";
    z-index: 1000;
}

.left {
    left: 10px;
}

.right {
    right: 10px;
}
.image-frame {
    width: 100%;
    height: 55vh;
    background-color: #c0c0c0; /* même gris que le container */
    border: 3px #303040; /* cadre noir */
    display: flex;
    align-items: center;
    justify-content: center;
    padding-top:-10px
}

.image-frame img {
    max-width: 90%;
    max-height: 90%;
    object-fit: contain;
    border: 2px solid #a0a0a0; /* liseré gris autour de l’image */
}
</style>
</head>
<body>
    
<div class="star left">★</div>
<div class="star right">★</div>
    
<div class="container">
<div class="image-frame">
    <img id="gallery">
</div>

    <div class="buttons">
        <button onclick="prevImage()">⬅ précédent</button>
        <button onclick="nextImage()">suivant ➡</button>
    </div>
</div>

<div class="footer">
    <p>Science & Poésie - 2025 - 🄯</p>
</div>

<script>
var images = [
"https://raw.githubusercontent.com/scienceetpoesie/internet/main/porno/conspiracy76.png",
];

var shuffledIndices = [];
var currentIndex = 0;

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

// Initialise le shuffle
function initShuffle() {
    shuffledIndices = [];
    for (let i = 0; i < images.length; i++) shuffledIndices.push(i);
    shuffledIndices = shuffle(shuffledIndices);
    currentIndex = 0;
}

// Affiche l'image courante
    function showImage() {
    document.getElementById("gallery").src = images[shuffledIndices[currentIndex]];
}

// Image suivante (shuffle)
function nextImage() {
    currentIndex++;
    if (currentIndex >= shuffledIndices.length) initShuffle(); // reshuffle après avoir tout vu
    showImage();
}

// Image précédente (séquentiel, dans l'ordre déjà affiché)
function prevImage() {
    if (currentIndex > 0) {
        currentIndex--;
        showImage();
    }
}

// Initialisation
initShuffle();
showImage();



    
</script>

</body>
</html>
