var shuffledIndices = [];
var currentIndex = 0;

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

// Initialise le shuffle
function initShuffle() {
    shuffledIndices = [];
    for (let i = 0; i < images.length; i++) shuffledIndices.push(i);
    shuffledIndices = shuffle(shuffledIndices);
    currentIndex = 0;
}

// Affiche l'image courante
    function showImage() {
    document.getElementById("gallery").src = images[shuffledIndices[currentIndex]];
}

// Image suivante (shuffle)
function nextImage() {
    currentIndex++;
    if (currentIndex >= shuffledIndices.length) initShuffle(); // reshuffle après avoir tout vu
    showImage();
}

// Image précédente (séquentiel, dans l'ordre déjà affiché)
function prevImage() {
    if (currentIndex > 0) {
        currentIndex--;
        showImage();
    }
}

// Initialisation
initShuffle();
showImage();
