<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Vintage Page</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background-color: #0b3d2e; /* vert forêt foncé */
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: "Georgia", serif;
    }

    .cadre {
      background-color: #f5f0e6; /* crème */
      padding: 20px;
      border: 3px solid #d6c7a1;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
      max-width: 80%;
      max-height: 80%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .cadre img {
      max-width: 100%;
      max-height: 100%;
      display: block;
    }
    .echo {
  position: fixed;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: rgba(0, 255, 200, 0.8);
  pointer-events: none;
  transform: translate(-50%, -50%);
  animation: fade 1.2s linear forwards;
  z-index: 999999; /* toujours au-dessus */
}

@keyframes fade {
  0% { opacity: 1; transform: scale(1) translate(-50%, -50%); }
  100% { opacity: 0; transform: scale(3) translate(-50%, -50%); }
}
  </style>
</head>
<body>

  <div class="cadre">
    <img src="https://github.com/scienceetpoesie/internet/blob/main/assets/gif/2/enconstruction.gif?raw=true" alt="Image vintage">
  </div>
<script>
(() => {
  let spawnRate = 1;

  document.addEventListener("mousemove", (e) => {
    for (let i = 0; i < spawnRate; i++) {
      const dot = document.createElement("div");
      dot.className = "echo";

      const offsetX = (Math.random() - 0.5) * 20;
      const offsetY = (Math.random() - 0.5) * 20;

      dot.style.left = (e.clientX + offsetX) + "px";
      dot.style.top = (e.clientY + offsetY) + "px";

      dot.style.background = `hsl(${Math.random() * 360}, 100%, 60%)`;

      document.body.appendChild(dot);

      // ⚠️ important pour éviter crash immédiat
      setTimeout(() => dot.remove(), 2000);
    }

    spawnRate = Math.min(30, spawnRate + 0.02);
  });
})();
</script>
</body>
</html>
