<!DOCTYPE html>
<html>
<head>
    <link rel="icon" href="https://github.com/scienceetpoesie/internet/raw/refs/heads/main/assets/icons/18.ico" type="image/x-icon">    
    <meta charset="UTF-8">
    <title>Anti-chambre</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #b55987;
        }

        .container {
            width: 350px;
            margin: 150px auto;
            background-color: #d3d3d3; /* gris */
            border: 2px solid #999;
            padding: 20px;
        }

        h2 {
            font-size: 16px;
            margin-bottom: 15px;
        }

        p {
            font-size: 13px;
            margin: 10px 0;
        }

        button {
            margin: 10px;
            padding: 5px 15px;
            font-size: 12px;
            border: 1px solid #666;
            background-color: #eee;
            cursor: pointer;
        }

        button:hover {
            background-color: #ccc;
        }

        .small {
            font-size: 10px;
            margin-top: 15px;
            color: #333;
        }
    </style>

    <script>
        function enterSite() {
            window.location.href = "gallery.html";
        }

        function leaveSite() {
            window.location.href = "https://www.google.com";
        }
    </script>
</head>
    
<body>
    <div class="container">
       <h1>⚠ CONTENU ADULTE ⚠</h1>
        <p>Cette partie du site contient des images érotiques, voire gores, ou simplement dérangeante<p>
        
        <p><strong>Avez vous plus de 18 ans?</strong></p>

        <button onclick="leaveSite()">NON </button>
        <button onclick="enterSite()">OUI </button>

        <div class="warning">
            En entrant, vous certifiez avoir + de 18 ans.<br>
        </div>
    </div>

</body>
</html>
