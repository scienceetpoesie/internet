var FALLBACKS = {
  gifTop:    { h:"60px", bg:"rgba(255,248,180,0.25)", msg:"[ GIF FRISE A — colombes / anges ]",    col:"#cc8800" },
  gifMiddle: { h:"50px", bg:"rgba(220,240,255,0.30)", msg:"[ GIF FRISE B — fleurs / rayons ]",     col:"#6688aa" },

function buildGif(id, url, height) {
  var el = document.getElementById(id);
  var fb = FALLBACKS[id];
  if (!url || url.indexOf("__") === 0) {
    el.style.cssText =
      "display:block;width:100%;text-align:center;padding:10px 0;" +
      "background:" + fb.bg + ";" +
      "font-size:11px;font-family:'Courier New',monospace;letter-spacing:3px;" +
      "color:" + fb.col + ";border-top:1px dashed " + fb.col + "55;" +
      "border-bottom:1px dashed " + fb.col + "55;";
    el.innerHTML = fb.msg;
    return;
  }
  var count = Math.ceil(window.innerWidth / 80) + 4;
  var html = '';
  for (var i = 0; i < count; i++) {
    html += '<img src="' + url + '" height="' + height + '" alt="">';
  }
  el.innerHTML = html;
}

/* =========================================================================
   AURÉOLE CANVAS — ellipse creuse avec flou gaussien
   ========================================================================= */
var _haloCounter = 0;
function makeHaloCanvas() {
  var id = 'halo-' + (_haloCounter++);
  var canvas = document.createElement('canvas');
  canvas.className = 'aureole-canvas';
  canvas.width = 320;
  canvas.height = 104;
  canvas.style.width = '140px';
  canvas.style.height = '52px';
  canvas.id = id;

  // Draw after layout
  setTimeout(function() {
    var ctx = canvas.getContext('2d');
    var w = 320, h = 104;
    var cx = w / 2, cy = h / 2;
    var rx = 130, ry = 22;

    ctx.clearRect(0, 0, w, h);

    // Multiple passes for soft gaussian glow — wide outer layers first
    var layers = [
      { blur: 18, width: 22, color: 'rgba(160,210,255,0.18)' },
      { blur: 12, width: 14, color: 'rgba(200,230,255,0.28)' },
      { blur: 8,  width: 9,  color: 'rgba(220,240,255,0.45)' },
      { blur: 5,  width: 5,  color: 'rgba(240,248,255,0.65)' },
      { blur: 3,  width: 3,  color: 'rgba(255,255,255,0.80)' },
      { blur: 1,  width: 1.5,color: 'rgba(255,255,255,0.95)' },
    ];

    for (var i = 0; i < layers.length; i++) {
      var l = layers[i];
      ctx.save();
      ctx.shadowBlur = l.blur * 2;
      ctx.shadowColor = l.color;
      ctx.strokeStyle = l.color;
      ctx.lineWidth = l.width;
      ctx.beginPath();
      ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    // Thin golden thread on top
    ctx.save();
    ctx.shadowBlur = 6;
    ctx.shadowColor = 'rgba(255,230,80,0.6)';
    ctx.strokeStyle = 'rgba(255,228,100,0.55)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();

  }, 0);

  return canvas;
}

function photoHTML(img) {
  if (img && img !== "") {
    return '<img class="portrait-img" src="' + img + '" alt="">';
  }
  return '<div class="portrait-placeholder">'
    + '<span class="ph-icon">&#x2726;</span>'
    + '<span class="ph-label">portrait<br>c\xe9leste</span>'
    + '</div>';
}

function makeCard(d) {
  // Outer wrapper: holds the halo above and the card below
  var outer = document.createElement('div');
  outer.className = 'card-outer';

  // Halo (canvas)
  outer.appendChild(makeHaloCanvas());

  // Card
  var div = document.createElement('div');
  div.className = 'portrait-card';
  div.innerHTML =
    '<div class="card-photo-area">' + photoHTML(d.img) + '</div>' +
    '<div class="card-body">' +
      '<div class="card-nom">' + d.nom + '</div>' +
      '<div class="card-date">' + d.date + '</div>' +
      '<div class="card-merite">' + d.merite + '</div>' +
    '</div>';
  div.onclick = function() { openPopup(d); };

  outer.appendChild(div);
  return outer;
}

var strip = document.getElementById('stripInner');
var ALL = ELUS.concat(ELUS).concat(ELUS).concat(ELUS);
for (var i = 0; i < ALL.length; i++) strip.appendChild(makeCard(ALL[i]));

function openPopup(d) {
  document.getElementById('p-portrait').innerHTML = photoHTML(d.img);
  document.getElementById('p-nom').textContent = d.nom;
  document.getElementById('p-dob').textContent = d.date;
  document.getElementById('p-merite').textContent = d.merite;
  document.getElementById('p-recompense').textContent = d.recompense;
  document.getElementById('p-id').textContent = 'Dossier ' + d.id + ' \xB7 Archives C\xE9lestes \xA9 MCMXCVI';
  document.getElementById('popup').classList.add('open');
}

function closePopup() {
  document.getElementById('popup').classList.remove('open');
}

document.getElementById('popup').addEventListener('click', function(e) {
  if (e.target === this) closePopup();
});

</script>
