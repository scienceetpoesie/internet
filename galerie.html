<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ma Galerie Vintage</title>
<style>
body {
    background-color: #008080;
    font-family: "Comic Sans MS", cursive;
    color: black;
    text-align: center;
}

.container {
    margin: 50px auto;
    width: 400px;
    background: #c0c0c0;
    border: 4px outset white;
    padding: 10px;
}

h1 {
    font-size: 20px;
}

img {
    width: 100%;
    height: 250px;
    object-fit: cover;
    border: 3px inset gray;
}

.buttons {
    margin-top: 10px;
}

button {
    background: #c0c0c0;
    border: 2px outset white;
    padding: 5px 15px;
    font-family: "Comic Sans MS";
    cursor: pointer;
}

button:active {
    border: 2px inset black;
}

.footer {
    margin-top: 20px;
    font-size: 12px;
}

.marquee {
    color: yellow;
    font-weight: bold;
}
</style>
</head>
<body>

<marquee class="marquee">★ Bienvenue dans ma galerie trop cool ★</marquee>

<div class="container">
    <h1>Mes Images Stylées</h1>
    <img id="gallery" src="image1.jpg">

    <div class="buttons">
        <button onclick="prevImage()">⬅ Précédent</button>
        <button onclick="nextImage()">Suivant ➡</button>
    </div>
</div>

<div class="footer">
    <p>Site optimisé pour Netscape Navigator 4.0 - 1998</p>
</div>

<script>
var images = [
    "image1.jpg",
    "image2.jpg",
    "image3.jpg",
    "image4.jpg"
];

var index = 0;

function showImage() {
    document.getElementById("gallery").src = images[index];
}

function nextImage() {
    index = (index + 1) % images.length;
    showImage();
}

function prevImage() {
    index = (index - 1 + images.length) % images.length;
    showImage();
}
</script>

</body>
</html>
